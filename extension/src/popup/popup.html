<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flux</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; width: 340px; font-family: system-ui, sans-serif; background: #0a0e1c; color: #f3f5fc; padding: 16px; }
    h1 { font-size: 0.95rem; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
    h1 .dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, #5f8eff, #a874ff); }
    p { color: rgba(196, 206, 228, 0.65); font-size: 0.78rem; margin: 0 0 14px; line-height: 1.5; }
    label { display: block; font-size: 0.74rem; color: rgba(196, 206, 228, 0.65); margin: 12px 0 4px; }
    input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 10px; color: #fff; font: inherit; }
    input:focus { outline: none; border-color: rgba(95, 142, 255, 0.55); }
    button { background: linear-gradient(125deg, #5f8eff, #a874ff); color: #fff; border: none; padding: 9px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }
    button.sec { background: rgba(255,255,255,0.06); }
    .row { display: flex; gap: 6px; align-items: center; }
    .row button { width: auto; padding: 6px 12px; font-size: 0.78rem; }
    #status { font-size: 0.7rem; color: #22c55e; margin-top: 6px; min-height: 1em; }
  </style>
</head>
<body>
  <h1><img src="../icons/icon-48.png" alt="" style="width:20px;height:20px;object-fit:contain"> Flux</h1>
  <p>Open the side rail to chat with Flux on any page.</p>
  <button id="openSidebar">Open side rail</button>
  <button id="signIn" class="sec">Sign in to Flux</button>
  <button id="openWeb" class="sec">Open Flux web app</button>

  <label for="host">Planner host</label>
  <div class="row">
    <input id="host" type="url" placeholder="https://your-flux.example/" />
    <button id="saveHost" class="sec">Save</button>
  </div>
  <div id="status"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
