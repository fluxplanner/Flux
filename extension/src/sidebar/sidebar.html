<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flux</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="../icons/icon-48.png" alt="Flux logo">
      <span class="brand-name">Flux</span>
    </div>
    <div class="top-actions">
      <button id="newChat" class="iconbtn" title="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button id="openWeb" class="iconbtn" title="Open Flux Planner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
      </button>
    </div>
  </header>

  <div class="context-bar" id="contextBar" title="Flux can see this tab">
    <img id="ctxFavicon" class="ctx-favicon" alt="" hidden>
    <span class="ctx-eye" id="ctxEye" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
    </span>
    <span class="ctx-title" id="ctxTitle">Looking at this tab…</span>
    <button id="liveToggle" class="live-toggle on" title="Live view: attach a screenshot of the tab to every message">
      <span class="live-dot"></span>Live
    </button>
  </div>

  <section class="suggestions" id="suggestions" aria-label="Suggestions"></section>

  <main class="chat" id="chat" aria-live="polite">
    <div class="hello" id="hello">
      <div class="hello-orb"></div>
      <h2>Hey, I can see your tab.</h2>
      <p>Ask about anything on screen — homework questions, articles, videos. With <b>Live</b> on, I look at a fresh screenshot every time you send.</p>
    </div>
  </main>

  <footer class="composer-wrap">
    <div class="attach-preview" id="attachPreview" hidden>
      <img id="attachImg" alt="Attached screenshot">
      <button id="attachRemove" class="attach-x" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="composer">
      <textarea id="composer" rows="1" placeholder="Ask about this page…" aria-label="Message"></textarea>
      <button id="captureBtn" class="iconbtn" title="Attach a screenshot of this tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <button id="sendBtn" class="sendbtn" title="Send" aria-label="Send">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </div>
  </footer>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
