<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Connect Claude · Flux Planner</title>
<link rel="icon" href="favicon.ico" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2440 0%, #0b1020 55%, #070b16 100%);
    color: #e6ebf5; padding: 24px;
  }
  .card {
    width: 100%; max-width: 460px; background: rgba(20, 27, 48, 0.86);
    border: 1px solid rgba(120, 140, 200, 0.18); border-radius: 20px;
    padding: 28px; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .brand .dot {
    width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center;
    background: linear-gradient(135deg, #6366f1, #22d3ee); font-weight: 800; color: #04122a;
  }
  .brand b { font-size: 1.05rem; letter-spacing: .2px; }
  h1 { font-size: 1.3rem; margin: 6px 0 6px; }
  p.lede { color: #9fb0d0; margin: 0 0 18px; }
  .scopes { list-style: none; padding: 0; margin: 18px 0; display: grid; gap: 10px; }
  .scopes li {
    display: flex; gap: 11px; align-items: flex-start; padding: 12px 14px;
    background: rgba(99, 110, 160, 0.10); border: 1px solid rgba(120, 140, 200, 0.14); border-radius: 12px;
  }
  .scopes .ic { flex: 0 0 auto; font-size: 1.05rem; line-height: 1.4; }
  .scopes .tt { font-weight: 600; }
  .scopes .ds { color: #93a4c6; font-size: .88rem; }
  .deny-note { color: #7e8db0; font-size: .82rem; margin: 14px 2px 0; }
  .who {
    display: flex; align-items: center; gap: 10px; margin: 6px 0 18px; padding: 10px 12px;
    border-radius: 12px; background: rgba(34, 211, 238, 0.07); border: 1px solid rgba(34, 211, 238, 0.18);
  }
  .who .av { width: 30px; height: 30px; border-radius: 50%; background: #2b3a63; display: grid; place-items: center; font-weight: 700; }
  .who small { color: #9fb0d0; }
  .row { display: flex; gap: 12px; margin-top: 22px; }
  button {
    flex: 1; cursor: pointer; font: inherit; font-weight: 650; padding: 13px 16px; border-radius: 12px;
    border: 1px solid transparent; transition: transform .06s ease, filter .15s ease;
  }
  button:active { transform: translateY(1px); }
  .primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
  .primary:hover { filter: brightness(1.08); }
  .ghost { background: rgba(120, 140, 200, 0.10); color: #cdd8f0; border-color: rgba(120, 140, 200, 0.22); }
  .full { width: 100%; }
  .signin-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1f2937; margin-bottom: 14px;
  }
  input[type=email] {
    width: 100%; padding: 12px 14px; border-radius: 12px; margin-bottom: 10px;
    background: rgba(10, 16, 32, 0.7); border: 1px solid rgba(120, 140, 200, 0.22); color: #e6ebf5; font: inherit;
  }
  .msg { margin-top: 14px; font-size: .9rem; padding: 11px 13px; border-radius: 11px; display: none; }
  .msg.err { display: block; background: rgba(248, 113, 113, .12); border: 1px solid rgba(248, 113, 113, .3); color: #fecaca; }
  .msg.ok { display: block; background: rgba(52, 211, 153, .12); border: 1px solid rgba(52, 211, 153, .3); color: #bbf7d0; }
  .muted-link { background: none; border: none; color: #8aa0cc; cursor: pointer; padding: 0; font: inherit; text-decoration: underline; flex: 0; }
  .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: r .7s linear infinite; vertical-align: -2px; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <div class="brand"><span class="dot">F</span><b>Flux Planner</b></div>
    <div id="content"><p class="lede"><span class="spin"></span> Loading…</p></div>
    <div class="msg" id="msg"></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="public/js/connect-claude.js"></script>
</body>
</html>
