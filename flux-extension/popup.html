<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 280px;
  background: #07080f;
  color: #eef0f7;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  font-size: 13px;
  padding: 16px;
}
.logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.logo-title {
  font-size: 16px;
  font-weight: 800;
  background: linear-gradient(135deg, #00bfff, #7c5cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, rgba(0,191,255,0.2), rgba(124,92,255,0.2));
  border: 1px solid rgba(0,191,255,0.3);
  color: #00bfff;
}
.btn-primary:hover { background: rgba(0,191,255,0.25); }
.status {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  padding-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}
#arcNote {
  display: none;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  line-height: 1.6;
  padding: 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo-row">
  <svg width="28" height="17" viewBox="0 0 60 32" fill="none" aria-hidden="true">
    <path d="M30,16 C32,5 46,5 46,16 C46,27 32,27 30,16 C28,27 14,27 14,16 C14,5 28,5 30,16 Z" fill="none" stroke="url(#pg)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="16" r="2.5" fill="#00bfff"/>
    <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00bfff" stop-opacity="0"/><stop offset="25%" stop-color="#00bfff"/><stop offset="75%" stop-color="#7c5cff"/><stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/></linearGradient></defs>
  </svg>
  <span class="logo-title">Flux Planner</span>
</div>
<div id="arcNote">You're in Arc. Use <strong>Open Flux Window</strong> for the assistant. Pin the Flux icon for quick access.</div>
<button type="button" class="btn btn-primary" id="openSidePanel">Open Flux Assistant</button>
<div class="status" id="statusText">Auto-reading page context</div>
<script>
document.getElementById('openSidePanel').addEventListener('click', async () => {
  const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
  const { isArcBrowser } = await chrome.storage.local.get('isArcBrowser');
  if (isArcBrowser) {
    chrome.runtime.sendMessage({ type: 'OPEN_ARC_POPUP' }, () => void chrome.runtime.lastError);
  } else if (tab?.id) {
    try {
      await chrome.sidePanel.open({ tabId: tab.id });
    } catch (_) {}
  }
  window.close();
});

chrome.storage.local.get('isArcBrowser', ({ isArcBrowser }) => {
  if (isArcBrowser) {
    document.getElementById('arcNote').style.display = 'block';
    document.getElementById('openSidePanel').textContent = 'Open Flux Window';
  }
});

chrome.storage.session.get('lastPageContext', ({ lastPageContext }) => {
  if (lastPageContext) {
    document.getElementById('statusText').textContent =
      `On: ${lastPageContext.domain || 'page'}`;
  }
});
</script>
</body>
</html>
